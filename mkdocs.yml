site_name: BeFam Docs
site_description: Digital genealogy and clan management platform documentation
site_author: BeFam Team
site_url: https://phamhungptithcm.github.io/gia-pha/
repo_url: https://github.com/phamhungptithcm/gia-pha
repo_name: phamhungptithcm/gia-pha
edit_uri: edit/main/docs/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: "© 2026 BeFam. All rights reserved."

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/release-sync.js

