server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "same-origin" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
