name: CI - Mobile E2E Deep

on:
  push:
    branches:
      - staging
      - main
    paths:
      - "mobile/befam/**"
      - "scripts/run_mobile_e2e.sh"
      - ".github/workflows/mobile-e2e.yml"
      - ".github/workflows/mobile-e2e-ios.yml"
      - ".github/workflows/mobile-e2e-deep.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-e2e-deep-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  deep-android-debug-full:
    name: Deep E2E - Android Debug Full
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Temporarily skip Android debug deep E2E
        run: echo "::notice::Temporarily skipping Android debug deep E2E while CI is focused on build and release."

  deep-ios-debug-full:
    name: Deep E2E - iOS Debug Full
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Temporarily skip iOS debug deep E2E
        run: echo "::notice::Temporarily skipping iOS debug deep E2E while CI is focused on build and release."

  deep-android-live-full:
    name: Deep E2E - Android Live Full
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Temporarily skip Android live deep E2E
        run: echo "::notice::Temporarily skipping Android live deep E2E while CI is focused on build and release."
