name: CI - Merge Guard

on:
  pull_request:
    branches:
      - staging
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  checks: read

concurrency:
  group: merge-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  wait-ci-quiet:
    name: Gate - No Running CI Before Merge
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Wait for required checks to complete successfully
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          required_checks=(
            "CI - Docs Validation and Build"
            "CI - Functions Build and Test"
            "CI - Mobile Build and Test"
          )
          if [ "${PR_HEAD_REPO}" = "${BASE_REPO}" ]; then
            required_checks+=(
              "E2E - Android Test Run"
              "E2E - iOS Test Run"
            )
          fi
          deadline_seconds=$((SECONDS + 80 * 60))
          while [ "$SECONDS" -lt "$deadline_seconds" ]; do
            check_runs_json="$(
              gh api \
                "repos/${GITHUB_REPOSITORY}/commits/${COMMIT_SHA}/check-runs?per_page=100"
            )"
            all_passed=true
            for check_name in "${required_checks[@]}"; do
              line="$(
                jq -r --arg name "$check_name" '
                  (.check_runs // [])
                  | map(select(.name == $name))
                  | sort_by(.completed_at // .started_at // .created_at)
                  | last
                  | if . == null then "" else [(.name // ""), (.status // ""), (.conclusion // "")] | @tsv end
                ' <<<"$check_runs_json"
              )"
              if [ -z "$line" ]; then
                echo " - ${check_name}: missing (waiting)"
                all_passed=false
                continue
              fi
              status="$(printf '%s' "$line" | awk -F'\t' '{print $2}')"
              conclusion="$(printf '%s' "$line" | awk -F'\t' '{print $3}')"
              echo " - ${check_name}: status=${status}, conclusion=${conclusion:-n/a}"
              if [ "$status" != "completed" ]; then
                all_passed=false
                continue
              fi
              if [ "$conclusion" != "success" ]; then
                echo "::error::Required check '${check_name}' finished with conclusion '${conclusion}'."
                exit 1
              fi
            done
            if [ "$all_passed" = true ]; then
              echo "All required CI checks completed. Branch is safe to merge."
              exit 0
            fi
            sleep 20
          done
          echo "::error::Timed out waiting for required CI checks to finish."
          exit 1
