name: CD - Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate-docs:
    name: Quality Gate - Docs
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Validate rules documentation
        run: python3 scripts/validate_rules_documentation.py

      - name: Build docs
        run: mkdocs build --strict

  quality-gate-functions:
    name: Quality Gate - Functions
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Build Functions
        run: npm run build

      - name: Run Functions contract tests
        run: npm test

  quality-gate-security:
    name: Quality Gate - Security
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Trivy filesystem security scan
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy security report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  quality-gate-mobile-fast:
    name: Quality Gate - Mobile Fast
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true

      - name: Run Flutter release catalog integration contract
        run: flutter test integration_test/e2e_release_catalog_contract_test.dart -d flutter-tester --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true --dart-define=BEFAM_ENABLE_APP_CHECK=false

      - name: Run Flutter web smoke tests
        run: xvfb-run -a flutter test --platform chrome --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true test/app/web/web_marketing_pages_test.dart

  quality-gate-mobile-e2e-android:
    name: Quality Gate - Mobile E2E Android
    needs: quality-gate-mobile-fast
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run Android E2E (debug mode)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          BEFAM_E2E_ANDROID_DEVICE: emulator-5554
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            chmod +x scripts/run_mobile_e2e.sh
            ./scripts/run_mobile_e2e.sh debug android

      - name: Upload Android E2E artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mobile-e2e-android-${{ github.run_id }}
          path: |
            mobile/befam/artifacts/**
            mobile/befam/integration_test/screenshots/**
          if-no-files-found: ignore

  prepare-release:
    name: Prepare release
    needs:
      - quality-gate-docs
      - quality-gate-functions
      - quality-gate-security
      - quality-gate-mobile-e2e-android
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      head_already_tagged: ${{ steps.version.outputs.head_already_tagged }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve release version
        id: version
        run: node scripts/next_release_version.mjs

      - name: Create release tag
        if: steps.version.outputs.head_already_tagged != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "chore(release): cut ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate friendly release notes
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES_PATH: dist/release-notes.md
          RELEASE_PRODUCT_NAME: BeFam
        run: node scripts/generate_release_notes.mjs

      - name: Append artifact summary to release notes
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat <<EOF >> dist/release-notes.md

          ## Release artifacts
          - Android AAB: \`befam-${RELEASE_VERSION}-android-release.aab\`
          - iOS IPA: \`befam-${RELEASE_VERSION}-ios-release.ipa\`
          - Mobile builder image: \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/befam-mobile-builder:${RELEASE_TAG}\`
          - Firebase tooling image: \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/befam-firebase-tools:${RELEASE_TAG}\`
          EOF

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes.md

  build-android-release:
    name: Build Android release
    needs: prepare-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Validate Android signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          required=(
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_KEYSTORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required Android signing secret: ${key}"
              exit 1
            fi
          done

      - name: Decode Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/android-release.keystore"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build Android release AAB
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-false}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done
          flutter build appbundle \
            --release \
            --build-name "${{ needs.prepare-release.outputs.version }}" \
            --build-number "${{ needs.prepare-release.outputs.build_number }}" \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Upload Android release AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: mobile/befam/build/app/outputs/bundle/release/app-release.aab

  build-ios-release:
    name: Build iOS release IPA
    needs: prepare-release
    runs-on: macos-latest
    env:
      COCOAPODS_DISABLE_STATS: "true"
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: mobile/befam/ios
        run: pod install

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Validate iOS signing secrets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          required=(
            IOS_P12_BASE64
            IOS_P12_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_TEAM_ID
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required iOS signing secret: ${key}"
              exit 1
            fi
          done

      - name: Import iOS signing certificate and provisioning profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          keychain_path="$RUNNER_TEMP/befam-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          cert_path="$RUNNER_TEMP/signing-cert.p12"
          profile_path="$RUNNER_TEMP/befam.mobileprovision"
          profile_plist="$RUNNER_TEMP/befam-profile.plist"

          echo "$IOS_P12_BASE64" | base64 --decode > "$cert_path"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -s "$keychain_path"

          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$IOS_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" "$profile_plist")
          profile_name=$(/usr/libexec/PlistBuddy -c "Print Name" "$profile_plist")
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"

          echo "IOS_SIGNING_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "IOS_SIGNING_KEYCHAIN_PASSWORD=$keychain_password" >> "$GITHUB_ENV"
          echo "IOS_PROVISIONING_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"

      - name: Build iOS signed release IPA
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ env.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-false}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done

          bundle_id="${BEFAM_FIREBASE_IOS_BUNDLE_ID:-com.familyclanapp.befam}"
          export_options_plist="ios/ExportOptions.plist"
          cat > "${export_options_plist}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${bundle_id}</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          flutter build ipa \
            --release \
            --build-name "${{ needs.prepare-release.outputs.version }}" \
            --build-number "${{ needs.prepare-release.outputs.build_number }}" \
            --export-options-plist="${export_options_plist}" \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Package signed iOS release IPA
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          ipa_path="build/ios/ipa/Runner.ipa"
          output_dir="${GITHUB_WORKSPACE}/dist/ios"
          asset_name="befam-${RELEASE_VERSION}-ios-release.ipa"

          if [ ! -f "${ipa_path}" ]; then
            echo "Expected signed iOS IPA not found at ${ipa_path}" >&2
            exit 1
          fi

          mkdir -p "${output_dir}"
          cp "${ipa_path}" "${output_dir}/${asset_name}"

      - name: Upload signed iOS release IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: dist/ios/*.ipa

  build-web-release:
    name: Build Web release bundle
    needs: prepare-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Build Flutter web (release)
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
        run: |
          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-false}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done
          flutter build web \
            --release \
            --no-wasm-dry-run \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Package web release bundle
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          output_dir="${GITHUB_WORKSPACE}/dist/web"
          mkdir -p "${output_dir}"
          tar -czf "${output_dir}/befam-${RELEASE_VERSION}-web-release.tar.gz" -C build/web .

      - name: Upload web release bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-release-bundle
          path: dist/web/*.tar.gz

  publish-mobile-image:
    name: Publish mobile image
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/befam-mobile-builder
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare-release.outputs.tag }}
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=sha,prefix=sha-

      - name: Build and push mobile image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            RELEASE_VERSION=${{ needs.prepare-release.outputs.version }}
            VCS_REF=${{ github.sha }}

  publish-firebase-image:
    name: Publish Firebase image
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/befam-firebase-tools
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare-release.outputs.tag }}
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=sha,prefix=sha-

      - name: Build and push Firebase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/firebase-tools.Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            RELEASE_VERSION=${{ needs.prepare-release.outputs.version }}
            VCS_REF=${{ github.sha }}

  publish-github-release:
    name: Publish GitHub release
    needs:
      - prepare-release
      - build-android-release
      - build-ios-release
      - build-web-release
      - publish-mobile-image
      - publish-firebase-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist

      - name: Download Android release AAB
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: dist/android

      - name: Download signed iOS release IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-release-ipa
          path: dist/ios

      - name: Download web release bundle
        uses: actions/download-artifact@v4
        with:
          name: web-release-bundle
          path: dist/web

      - name: Generate release manifest and checksums
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          android_asset_path="dist/android/app-release.aab"
          ios_asset_path="dist/ios/befam-${RELEASE_VERSION}-ios-release.ipa"
          web_asset_path="dist/web/befam-${RELEASE_VERSION}-web-release.tar.gz"
          sha256sum "${android_asset_path}" "${ios_asset_path}" "${web_asset_path}" > dist/checksums.txt
          cat > dist/release-manifest.json <<EOF
          {
            "releaseTag": "${RELEASE_TAG}",
            "releaseVersion": "${RELEASE_VERSION}",
            "gitSha": "${GITHUB_SHA}",
            "workflowRunId": "${GITHUB_RUN_ID}",
            "generatedAtUtc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "artifacts": [
              "befam-${RELEASE_VERSION}-android-release.aab",
              "befam-${RELEASE_VERSION}-ios-release.ipa",
              "befam-${RELEASE_VERSION}-web-release.tar.gz"
            ]
          }
          EOF

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: |
            dist/release-manifest.json
            dist/checksums.txt

      - name: Attest Android release artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/android/app-release.aab

      - name: Attest iOS release artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ios/*.ipa

      - name: Attest Web release bundle
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/web/*.tar.gz

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          title="BeFam ${RELEASE_TAG}"
          android_asset_path="dist/android/app-release.aab"
          android_asset_name="befam-${RELEASE_VERSION}-android-release.aab"
          ios_asset_path="dist/ios/befam-${RELEASE_VERSION}-ios-release.ipa"
          ios_asset_name="befam-${RELEASE_VERSION}-ios-release.ipa"
          web_asset_path="dist/web/befam-${RELEASE_VERSION}-web-release.tar.gz"
          web_asset_name="befam-${RELEASE_VERSION}-web-release.tar.gz"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${title}" \
              --notes-file dist/release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --title "${title}" \
              --notes-file dist/release-notes.md
          fi

          gh release upload "${RELEASE_TAG}" "${android_asset_path}#${android_asset_name}" --clobber
          gh release upload "${RELEASE_TAG}" "${ios_asset_path}#${ios_asset_name}" --clobber
          gh release upload "${RELEASE_TAG}" "${web_asset_path}#${web_asset_name}" --clobber
          gh release upload "${RELEASE_TAG}" "dist/checksums.txt#checksums-${RELEASE_VERSION}.txt" --clobber
          gh release upload "${RELEASE_TAG}" "dist/release-manifest.json#release-manifest-${RELEASE_VERSION}.json" --clobber

  notify-release-failure:
    name: Notify release failure
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs:
      - quality-gate-docs
      - quality-gate-functions
      - quality-gate-security
      - quality-gate-mobile-fast
      - quality-gate-mobile-e2e-android
      - prepare-release
      - build-android-release
      - build-ios-release
      - build-web-release
      - publish-mobile-image
      - publish-firebase-image
      - publish-github-release
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping notification."
            exit 0
          fi
          payload="$(cat <<JSON
          {
            "text": ":x: BeFam release pipeline failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*BeFam CD - Release Main failed*\\nRepository: ${GITHUB_REPOSITORY}\\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
                }
              }
            ]
          }
          JSON
          )"
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
