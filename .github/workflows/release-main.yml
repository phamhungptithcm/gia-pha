name: CD - Release Main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: read

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate-main-ci-e2e:
    name: Gate - Wait for Main CI + E2E
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Wait for required checks on main commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          required_checks=(
            "CI - Docs Validation and Build"
            "CI - Functions Build and Test"
            "CI - Mobile Build and Test"
            "Security - Trivy Filesystem Scan"
            "Security - Gitleaks Secret Scan"
            "Security - Trivy Container Image Scan"
            "E2E - Android Test Run"
            "E2E - iOS Test Run"
          )

          deadline_seconds=$((SECONDS + 90 * 60))
          check_creation_deadline_seconds=$((SECONDS + 20 * 60))

          while [ "$SECONDS" -lt "$deadline_seconds" ]; do
            echo "Checking status for commit ${COMMIT_SHA}..."
            check_runs_json="$(
              gh api \
                "repos/${GITHUB_REPOSITORY}/commits/${COMMIT_SHA}/check-runs?per_page=100" \
            )"

            all_passed=true
            saw_any_required_check=false
            for check_name in "${required_checks[@]}"; do
              line="$(
                jq -r --arg name "$check_name" '
                  (.check_runs // [])
                  | map(select(.name == $name))
                  | sort_by(.completed_at // .started_at // .created_at)
                  | last
                  | if . == null then "" else [(.name // ""), (.status // ""), (.conclusion // "")] | @tsv end
                ' <<<"$check_runs_json"
              )"
              if [ -z "$line" ]; then
                echo " - ${check_name}: missing (waiting)"
                all_passed=false
                continue
              fi

              saw_any_required_check=true

              status="$(printf '%s' "$line" | awk -F'\t' '{print $2}')"
              conclusion="$(printf '%s' "$line" | awk -F'\t' '{print $3}')"
              echo " - ${check_name}: status=${status}, conclusion=${conclusion:-n/a}"

              if [ "$status" != "completed" ]; then
                all_passed=false
                continue
              fi

              if [ "$conclusion" != "success" ]; then
                echo "::error::Required check '${check_name}' completed with conclusion '${conclusion}'."
                exit 1
              fi
            done

            if [ "$saw_any_required_check" = false ] && [ "$SECONDS" -ge "$check_creation_deadline_seconds" ]; then
              echo "::error::No required checks were created within 20 minutes for commit ${COMMIT_SHA}. Failing fast to avoid a stuck release gate."
              exit 1
            fi

            if [ "$all_passed" = true ]; then
              echo "All required main CI/E2E checks are green."
              exit 0
            fi

            sleep 20
          done

          echo "::error::Timed out waiting for required main CI/E2E checks."
          exit 1

  quality-gate-docs:
    name: Quality Gate - Docs
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: gate-main-ci-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Validate rules documentation
        run: python3 scripts/validate_rules_documentation.py

      - name: Build docs
        run: mkdocs build --strict

  quality-gate-functions:
    name: Quality Gate - Functions
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: gate-main-ci-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Build Functions
        run: npm run build

      - name: Enforce Functions dead-code gate
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters

      - name: Run Functions contract tests
        run: npm test

  quality-gate-security:
    name: Quality Gate - Security
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: gate-main-ci-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Trivy filesystem scan (SARIF report)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-fs.sarif
          trivyignores: .trivyignore
          skip-files: firebase/functions/firestore-debug.log

      - name: Upload Trivy security report
        if: always()
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Enforce Trivy filesystem gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          trivyignores: .trivyignore
          skip-files: firebase/functions/firestore-debug.log

  quality-gate-mobile-fast:
    name: Quality Gate - Mobile Fast
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: gate-main-ci-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Enforce Dart dead-code gate
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run Flutter tests
        run: flutter test --coverage --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true

      - name: Enforce Flutter coverage gate
        env:
          MOBILE_MIN_COVERAGE_PERCENT: ${{ vars.MOBILE_MIN_COVERAGE_PERCENT }}
        run: |
          set -euo pipefail
          min="${MOBILE_MIN_COVERAGE_PERCENT:-40}"
          coverage_file="coverage/lcov.info"
          if [ ! -f "$coverage_file" ]; then
            echo "::error::Missing coverage report at ${coverage_file}"
            exit 1
          fi
          actual="$(awk -F: '
            /^LF:/ { lf += $2 }
            /^LH:/ { lh += $2 }
            END {
              if (lf <= 0) {
                print "0.00";
                exit;
              }
              printf "%.2f", (100 * lh / lf);
            }' "$coverage_file")"
          echo "Flutter coverage: ${actual}% (minimum ${min}%)"
          awk -v actual="$actual" -v min="$min" 'BEGIN { exit (actual + 0 >= min + 0 ? 0 : 1) }' || {
            echo "::error::Flutter coverage gate failed: ${actual}% < ${min}%"
            exit 1
          }

      - name: Run Flutter release catalog integration contract
        run: flutter test integration_test/e2e_release_catalog_contract_test.dart -d flutter-tester --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true --dart-define=BEFAM_ENABLE_APP_CHECK=false

      - name: Run Flutter web smoke tests
        run: xvfb-run -a flutter test --platform chrome --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true test/app/web/web_marketing_pages_test.dart

  quality-gate-mobile-e2e-android:
    name: Quality Gate - Mobile E2E Android
    needs: quality-gate-mobile-fast
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Run Android E2E (debug mode)
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        env:
          BEFAM_E2E_ANDROID_DEVICE: emulator-5554
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            chmod +x scripts/run_mobile_e2e.sh
            ./scripts/run_mobile_e2e.sh debug android

      - name: Upload Android E2E artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-mobile-e2e-android-${{ github.run_id }}
          path: |
            mobile/befam/artifacts/**
            mobile/befam/integration_test/screenshots/**
          if-no-files-found: ignore

  preflight-production-readiness:
    name: Preflight - Production Readiness
    needs:
      - quality-gate-docs
      - quality-gate-functions
      - quality-gate-security
      - quality-gate-mobile-e2e-android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate production deploy secrets and vars
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          PRODUCTION_FIREBASE_PROJECT_ID: ${{ vars.PRODUCTION_FIREBASE_PROJECT_ID }}
          STAGING_FIREBASE_PROJECT_ID: ${{ vars.STAGING_FIREBASE_PROJECT_ID }}
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
          GOOGLE_PLAY_PACKAGE_NAME: ${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}
          BILLING_WEBHOOK_SECRET: ${{ secrets.BILLING_WEBHOOK_SECRET }}
          APPLE_SHARED_SECRET: ${{ secrets.APPLE_SHARED_SECRET }}
        run: |
          set -euo pipefail
          required_vars=(
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
            FIREBASE_PROJECT_ID
            PRODUCTION_FIREBASE_PROJECT_ID
            FIREBASE_FUNCTIONS_REGION
            FIRESTORE_DATABASE_ID
            GOOGLE_PLAY_PACKAGE_NAME
            BILLING_WEBHOOK_SECRET
            APPLE_SHARED_SECRET
          )
          for key in "${required_vars[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required production key: ${key}"
              exit 1
            fi
          done
          expected_project="${PRODUCTION_FIREBASE_PROJECT_ID}"
          if [ "$FIREBASE_PROJECT_ID" != "$expected_project" ]; then
            echo "::error::Release pipeline must target configured project ${expected_project}. Current: ${FIREBASE_PROJECT_ID}."
            exit 1
          fi
          if [ -n "${STAGING_FIREBASE_PROJECT_ID:-}" ] && [ "$FIREBASE_PROJECT_ID" = "$STAGING_FIREBASE_PROJECT_ID" ]; then
            echo "::error::Release pipeline is targeting staging Firebase project ${STAGING_FIREBASE_PROJECT_ID}."
            exit 1
          fi

      - name: Validate mobile signing secrets for release build
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -euo pipefail
          required_secrets=(
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_KEYSTORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
            IOS_P12_BASE64
            IOS_P12_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_TEAM_ID
          )
          for key in "${required_secrets[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required release signing secret: ${key}"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install Functions dependencies
        working-directory: firebase/functions
        run: npm ci

      - name: Verify production subscription package catalog
        working-directory: firebase/functions
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
        run: npm run config:subscription-packages:check

  prepare-release:
    name: Prepare Release
    needs:
      - preflight-production-readiness
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      head_already_tagged: ${{ steps.version.outputs.head_already_tagged }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"

      - name: Resolve release version
        id: version
        env:
          RELEASE_TIMEZONE: ${{ vars.APP_TIMEZONE }}
        run: node scripts/next_release_version.mjs

      - name: Create release tag
        if: steps.version.outputs.head_already_tagged != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "chore(release): cut ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate friendly release notes
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES_PATH: dist/release-notes.md
          RELEASE_PRODUCT_NAME: BeFam
        run: node scripts/generate_release_notes.mjs

      - name: Append artifact summary to release notes
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat <<EOF >> dist/release-notes.md

          ## Release artifacts
          - Android AAB: \`befam-${RELEASE_VERSION}-android-release.aab\`
          - iOS IPA: \`befam-${RELEASE_VERSION}-ios-release.ipa\`
          - Mobile builder image: \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/befam-mobile-builder:${RELEASE_TAG}\`
          - Firebase tooling image: \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/befam-firebase-tools:${RELEASE_TAG}\`
          EOF

      - name: Upload release notes artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-notes
          path: dist/release-notes.md

  build-android-release:
    name: Build Android Release
    needs: prepare-release
    runs-on: ubuntu-latest
    environment:
      name: production
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Validate Android signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          required=(
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_KEYSTORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required Android signing secret: ${key}"
              exit 1
            fi
          done

      - name: Decode Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/android-release.keystore"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build Android release AAB
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_OTP_PROVIDER: ${{ vars.BEFAM_OTP_PROVIDER }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          BEFAM_IOS_APP_STORE_URL: ${{ vars.BEFAM_IOS_APP_STORE_URL }}
          BEFAM_ANDROID_PLAY_STORE_URL: ${{ vars.BEFAM_ANDROID_PLAY_STORE_URL }}
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-false}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          otp_provider="${BEFAM_OTP_PROVIDER:-twilio}"
          if [ "$allow_bundled" != "false" ]; then
            echo "::error::Production release builds must set BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=false. Current: ${allow_bundled}"
            exit 1
          fi
          if [ "$otp_provider" != "twilio" ]; then
            echo "::error::Production release builds must use BEFAM_OTP_PROVIDER=twilio. Current: ${otp_provider}"
            exit 1
          fi
          required_android_keys=(
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
          )
          for key in "${required_android_keys[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required production Android var: ${key}"
              exit 1
            fi
          done
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
            BEFAM_IOS_APP_STORE_URL
            BEFAM_ANDROID_PLAY_STORE_URL
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done
          flutter build appbundle \
            --release \
            --build-name "${{ needs.prepare-release.outputs.version }}" \
            --build-number "${{ needs.prepare-release.outputs.build_number }}" \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_OTP_PROVIDER="${otp_provider}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Upload Android release AAB
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-release-aab
          path: mobile/befam/build/app/outputs/bundle/release/app-release.aab

  build-ios-release:
    name: Build iOS Release IPA
    needs: prepare-release
    runs-on: macos-latest
    environment:
      name: production
    env:
      COCOAPODS_DISABLE_STATS: "true"
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: mobile/befam/ios
        run: pod install

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Validate iOS signing secrets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          required=(
            IOS_P12_BASE64
            IOS_P12_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_TEAM_ID
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required iOS signing secret: ${key}"
              exit 1
            fi
          done

      - name: Import iOS signing certificate and provisioning profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          keychain_path="$RUNNER_TEMP/befam-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          cert_path="$RUNNER_TEMP/signing-cert.p12"
          profile_path="$RUNNER_TEMP/befam.mobileprovision"
          profile_plist="$RUNNER_TEMP/befam-profile.plist"

          echo "$IOS_P12_BASE64" | base64 --decode > "$cert_path"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -s "$keychain_path"

          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$IOS_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" "$profile_plist")
          profile_name=$(/usr/libexec/PlistBuddy -c "Print Name" "$profile_plist")
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"

          echo "IOS_SIGNING_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "IOS_SIGNING_KEYCHAIN_PASSWORD=$keychain_password" >> "$GITHUB_ENV"
          echo "IOS_PROVISIONING_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"

      - name: Build iOS signed release IPA
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_OTP_PROVIDER: ${{ vars.BEFAM_OTP_PROVIDER }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          BEFAM_IOS_APP_STORE_URL: ${{ vars.BEFAM_IOS_APP_STORE_URL }}
          BEFAM_ANDROID_PLAY_STORE_URL: ${{ vars.BEFAM_ANDROID_PLAY_STORE_URL }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ env.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-false}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          otp_provider="${BEFAM_OTP_PROVIDER:-twilio}"
          if [ "$allow_bundled" != "false" ]; then
            echo "::error::Production release builds must set BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=false. Current: ${allow_bundled}"
            exit 1
          fi
          if [ "$otp_provider" != "twilio" ]; then
            echo "::error::Production release builds must use BEFAM_OTP_PROVIDER=twilio. Current: ${otp_provider}"
            exit 1
          fi
          required_ios_keys=(
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
          )
          for key in "${required_ios_keys[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required production iOS var: ${key}"
              exit 1
            fi
          done
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
            BEFAM_IOS_APP_STORE_URL
            BEFAM_ANDROID_PLAY_STORE_URL
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done

          bundle_id="${BEFAM_FIREBASE_IOS_BUNDLE_ID:-}"
          if [ -z "$bundle_id" ]; then
            echo "::error::Missing required production var: BEFAM_FIREBASE_IOS_BUNDLE_ID"
            exit 1
          fi
          export_options_plist="ios/ExportOptions.plist"
          cat > "${export_options_plist}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${bundle_id}</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          flutter build ipa \
            --release \
            --build-name "${{ needs.prepare-release.outputs.version }}" \
            --build-number "${{ needs.prepare-release.outputs.build_number }}" \
            --export-options-plist="${export_options_plist}" \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_OTP_PROVIDER="${otp_provider}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Package signed iOS release IPA
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          ipa_path="build/ios/ipa/Runner.ipa"
          output_dir="${GITHUB_WORKSPACE}/dist/ios"
          asset_name="befam-${RELEASE_VERSION}-ios-release.ipa"

          if [ ! -f "${ipa_path}" ]; then
            echo "Expected signed iOS IPA not found at ${ipa_path}" >&2
            exit 1
          fi

          mkdir -p "${output_dir}"
          cp "${ipa_path}" "${output_dir}/${asset_name}"

      - name: Upload signed iOS release IPA
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-release-ipa
          path: dist/ios/*.ipa

  build-web-release:
