name: Deploy Firebase

on:
  push:
    branches:
      - main
    paths:
      - "firebase.json"
      - "firebase/**"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-firebase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install Functions dependencies
        working-directory: firebase/functions
        run: npm ci

      - name: Build Functions
        working-directory: firebase/functions
        run: npm run build

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@14.19.1

      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT"
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$FIREBASE_FUNCTIONS_REGION"
          CREDENTIALS_PATH="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$CREDENTIALS_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"
          echo "GOOGLE_CLOUD_PROJECT=$FIREBASE_PROJECT_ID" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID" >> "$GITHUB_ENV"
          echo "FIREBASE_FUNCTIONS_REGION=$FIREBASE_FUNCTIONS_REGION" >> "$GITHUB_ENV"
          echo "APP_TIMEZONE=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}" >> "$GITHUB_ENV"

      - name: Write Functions runtime env file
        working-directory: firebase/functions
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          APP_RUNTIME_CONFIG_COLLECTION: ${{ vars.APP_RUNTIME_CONFIG_COLLECTION }}
          APP_RUNTIME_CONFIG_DOC_ID: ${{ vars.APP_RUNTIME_CONFIG_DOC_ID }}
          EXPIRE_INVITES_JOB_SCHEDULE: ${{ vars.EXPIRE_INVITES_JOB_SCHEDULE }}
          BILLING_SUBSCRIPTION_REMINDER_JOB_SCHEDULE: ${{ vars.BILLING_SUBSCRIPTION_REMINDER_JOB_SCHEDULE }}
          BILLING_DELINQUENCY_JOB_SCHEDULE: ${{ vars.BILLING_DELINQUENCY_JOB_SCHEDULE }}
          BILLING_PENDING_TIMEOUT_JOB_SCHEDULE: ${{ vars.BILLING_PENDING_TIMEOUT_JOB_SCHEDULE }}
          BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BILLING_PENDING_TIMEOUT_MINUTES }}
          BILLING_PENDING_TIMEOUT_LIMIT: ${{ vars.BILLING_PENDING_TIMEOUT_LIMIT }}
          BILLING_DELINQUENCY_GRACE_DAYS: ${{ vars.BILLING_DELINQUENCY_GRACE_DAYS }}
          BILLING_DELINQUENCY_LIMIT: ${{ vars.BILLING_DELINQUENCY_LIMIT }}
          BILLING_DELINQUENCY_REMINDER_DAYS: ${{ vars.BILLING_DELINQUENCY_REMINDER_DAYS }}
          BILLING_ALLOW_MANUAL_SETTLEMENT: ${{ vars.BILLING_ALLOW_MANUAL_SETTLEMENT }}
          BILLING_QR_CHECKOUT_ENABLED: ${{ vars.BILLING_QR_CHECKOUT_ENABLED }}
          BILLING_CARD_CHECKOUT_URL_BASE: ${{ vars.BILLING_CARD_CHECKOUT_URL_BASE }}
          BILLING_VNPAY_FALLBACK_URL: ${{ vars.BILLING_VNPAY_FALLBACK_URL }}
          BILLING_VNPAY_GATEWAY_BASE_URL: ${{ vars.BILLING_VNPAY_GATEWAY_BASE_URL }}
          VNPAY_RETURN_URL: ${{ vars.VNPAY_RETURN_URL }}
          BILLING_VNPAY_IP_ADDRESS: ${{ vars.BILLING_VNPAY_IP_ADDRESS }}
          BILLING_VNPAY_LOCALE: ${{ vars.BILLING_VNPAY_LOCALE }}
          BILLING_QR_IMAGE_BASE_URL: ${{ vars.BILLING_QR_IMAGE_BASE_URL }}
          BILLING_QR_IMAGE_PLUS_URL: ${{ vars.BILLING_QR_IMAGE_PLUS_URL }}
          BILLING_QR_IMAGE_PRO_URL: ${{ vars.BILLING_QR_IMAGE_PRO_URL }}
          BILLING_WEBHOOK_SECRET: ${{ secrets.BILLING_WEBHOOK_SECRET }}
          CARD_WEBHOOK_SECRET: ${{ secrets.CARD_WEBHOOK_SECRET }}
          VNPAY_TMNCODE: ${{ secrets.VNPAY_TMNCODE }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$FIREBASE_FUNCTIONS_REGION"
          test -n "$BILLING_WEBHOOK_SECRET"
          test -n "$VNPAY_TMNCODE"
          test -n "$VNPAY_HASH_SECRET"
          resolved_card_secret="${CARD_WEBHOOK_SECRET:-$BILLING_WEBHOOK_SECRET}"
          resolved_app_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          resolved_runtime_collection="${APP_RUNTIME_CONFIG_COLLECTION:-runtimeConfig}"
          resolved_runtime_doc="${APP_RUNTIME_CONFIG_DOC_ID:-global}"
          resolved_expire_invites_schedule="${EXPIRE_INVITES_JOB_SCHEDULE:-0 * * * *}"
          resolved_reminder_schedule="${BILLING_SUBSCRIPTION_REMINDER_JOB_SCHEDULE:-0 7 * * *}"
          resolved_delinquency_schedule="${BILLING_DELINQUENCY_JOB_SCHEDULE:-0 8 * * *}"
          resolved_pending_schedule="${BILLING_PENDING_TIMEOUT_JOB_SCHEDULE:-*/5 * * * *}"
          resolved_pending_minutes="${BILLING_PENDING_TIMEOUT_MINUTES:-20}"
          resolved_pending_limit="${BILLING_PENDING_TIMEOUT_LIMIT:-800}"
          resolved_delinquency_grace_days="${BILLING_DELINQUENCY_GRACE_DAYS:-7}"
          resolved_delinquency_limit="${BILLING_DELINQUENCY_LIMIT:-800}"
          resolved_delinquency_reminder_days="${BILLING_DELINQUENCY_REMINDER_DAYS:-7,3,1}"
          resolved_allow_manual_settlement="${BILLING_ALLOW_MANUAL_SETTLEMENT:-false}"
          resolved_qr_checkout_enabled="${BILLING_QR_CHECKOUT_ENABLED:-false}"
          resolved_gateway_base_url="${BILLING_VNPAY_GATEWAY_BASE_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}"
          resolved_return_url="${VNPAY_RETURN_URL:-https://${FIREBASE_FUNCTIONS_REGION}-${FIREBASE_PROJECT_ID}.cloudfunctions.net/vnpayPaymentCallback}"
          resolved_vnpay_ip="${BILLING_VNPAY_IP_ADDRESS:-127.0.0.1}"
          resolved_vnpay_locale="${BILLING_VNPAY_LOCALE:-vn}"
          case "$resolved_vnpay_locale" in
            vn|en) ;;
            *) echo "Unsupported BILLING_VNPAY_LOCALE: $resolved_vnpay_locale"; exit 1 ;;
          esac
          test -n "$resolved_return_url"
          test -n "$resolved_gateway_base_url"
          env_file=".env.${FIREBASE_PROJECT_ID}"
          cat > "$env_file" <<EOF
          APP_REGION=${FIREBASE_FUNCTIONS_REGION}
          APP_TIMEZONE=${resolved_app_timezone}
          APP_RUNTIME_CONFIG_COLLECTION=${resolved_runtime_collection}
          APP_RUNTIME_CONFIG_DOC_ID=${resolved_runtime_doc}
          EXPIRE_INVITES_JOB_SCHEDULE="${resolved_expire_invites_schedule}"
          BILLING_SUBSCRIPTION_REMINDER_JOB_SCHEDULE="${resolved_reminder_schedule}"
          BILLING_DELINQUENCY_JOB_SCHEDULE="${resolved_delinquency_schedule}"
          BILLING_PENDING_TIMEOUT_JOB_SCHEDULE="${resolved_pending_schedule}"
          BILLING_PENDING_TIMEOUT_MINUTES=${resolved_pending_minutes}
          BILLING_PENDING_TIMEOUT_LIMIT=${resolved_pending_limit}
          BILLING_DELINQUENCY_GRACE_DAYS=${resolved_delinquency_grace_days}
          BILLING_DELINQUENCY_LIMIT=${resolved_delinquency_limit}
          BILLING_DELINQUENCY_REMINDER_DAYS=${resolved_delinquency_reminder_days}
          BILLING_ALLOW_MANUAL_SETTLEMENT=${resolved_allow_manual_settlement}
          BILLING_QR_CHECKOUT_ENABLED=${resolved_qr_checkout_enabled}
          BILLING_CARD_CHECKOUT_URL_BASE=${BILLING_CARD_CHECKOUT_URL_BASE}
          BILLING_VNPAY_FALLBACK_URL=${BILLING_VNPAY_FALLBACK_URL}
          BILLING_VNPAY_GATEWAY_BASE_URL=${resolved_gateway_base_url}
          VNPAY_RETURN_URL=${resolved_return_url}
          BILLING_VNPAY_IP_ADDRESS=${resolved_vnpay_ip}
          BILLING_VNPAY_LOCALE=${resolved_vnpay_locale}
          BILLING_QR_IMAGE_BASE_URL=${BILLING_QR_IMAGE_BASE_URL}
          BILLING_QR_IMAGE_PLUS_URL=${BILLING_QR_IMAGE_PLUS_URL}
          BILLING_QR_IMAGE_PRO_URL=${BILLING_QR_IMAGE_PRO_URL}
          BILLING_WEBHOOK_SECRET=${BILLING_WEBHOOK_SECRET}
          CARD_WEBHOOK_SECRET=${resolved_card_secret}
          VNPAY_TMNCODE=${VNPAY_TMNCODE}
          VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
          EOF
          echo "APP_RUNTIME_CONFIG_COLLECTION=$resolved_runtime_collection" >> "$GITHUB_ENV"
          echo "APP_RUNTIME_CONFIG_DOC_ID=$resolved_runtime_doc" >> "$GITHUB_ENV"
          echo "BILLING_PENDING_TIMEOUT_MINUTES=$resolved_pending_minutes" >> "$GITHUB_ENV"
          echo "BILLING_PENDING_TIMEOUT_LIMIT=$resolved_pending_limit" >> "$GITHUB_ENV"
          echo "BILLING_DELINQUENCY_GRACE_DAYS=$resolved_delinquency_grace_days" >> "$GITHUB_ENV"
          echo "BILLING_DELINQUENCY_LIMIT=$resolved_delinquency_limit" >> "$GITHUB_ENV"
          echo "BILLING_DELINQUENCY_REMINDER_DAYS=$resolved_delinquency_reminder_days" >> "$GITHUB_ENV"
          echo "BILLING_QR_CHECKOUT_ENABLED=$resolved_qr_checkout_enabled" >> "$GITHUB_ENV"
          echo "BILLING_CARD_CHECKOUT_URL_BASE=$BILLING_CARD_CHECKOUT_URL_BASE" >> "$GITHUB_ENV"
          echo "BILLING_VNPAY_FALLBACK_URL=$BILLING_VNPAY_FALLBACK_URL" >> "$GITHUB_ENV"
          echo "BILLING_VNPAY_GATEWAY_BASE_URL=$resolved_gateway_base_url" >> "$GITHUB_ENV"
          echo "VNPAY_RETURN_URL=$resolved_return_url" >> "$GITHUB_ENV"
          echo "BILLING_VNPAY_IP_ADDRESS=$resolved_vnpay_ip" >> "$GITHUB_ENV"
          echo "BILLING_VNPAY_LOCALE=$resolved_vnpay_locale" >> "$GITHUB_ENV"
          echo "BILLING_QR_IMAGE_BASE_URL=$BILLING_QR_IMAGE_BASE_URL" >> "$GITHUB_ENV"
          echo "BILLING_QR_IMAGE_PLUS_URL=$BILLING_QR_IMAGE_PLUS_URL" >> "$GITHUB_ENV"
          echo "BILLING_QR_IMAGE_PRO_URL=$BILLING_QR_IMAGE_PRO_URL" >> "$GITHUB_ENV"
          echo "Wrote runtime environment file: firebase/functions/$env_file"
          echo "Resolved VNPay return URL: $resolved_return_url"

      - name: Verify Firebase access
        run: firebase use "${{ vars.FIREBASE_PROJECT_ID }}" --project "${{ vars.FIREBASE_PROJECT_ID }}"

      - name: Sync runtime config document
        working-directory: firebase/functions
        run: node scripts/upsert-runtime-config.mjs

      - name: Deploy Firestore, Storage, and Functions
        run: >
          firebase deploy
          --project "${{ vars.FIREBASE_PROJECT_ID }}"
          --non-interactive
          --only firestore:rules,firestore:indexes,storage,functions
