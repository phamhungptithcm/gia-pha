name: Monitoring Healthcheck

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitoring-healthcheck
  cancel-in-progress: true

jobs:
  web-and-functions:
    name: web-and-functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve healthcheck endpoints
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          BEFAM_WEB_BASE_URL: ${{ vars.BEFAM_WEB_BASE_URL }}
          BEFAM_HEALTHCHECK_URL: ${{ vars.BEFAM_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          project_id="${FIREBASE_PROJECT_ID:-be-fam-3ab23}"
          region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          web_base="${BEFAM_WEB_BASE_URL:-https://${project_id}.web.app}"
          health_url="${BEFAM_HEALTHCHECK_URL:-https://${region}-${project_id}.cloudfunctions.net/appHealthCheck}"
          echo "FIREBASE_PROJECT_ID_RESOLVED=${project_id}" >> "$GITHUB_ENV"
          echo "WEB_BASE_URL=${web_base}" >> "$GITHUB_ENV"
          echo "HEALTHCHECK_URL=${health_url}" >> "$GITHUB_ENV"

      - name: Check web home route
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "${WEB_BASE_URL}/" > /tmp/befam-web-home.html
          test -s /tmp/befam-web-home.html

      - name: Check web app route
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "${WEB_BASE_URL}/app" > /tmp/befam-web-app.html
          test -s /tmp/befam-web-app.html

      - name: Check functions health endpoint
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error --location "${HEALTHCHECK_URL}")"
          echo "${response}" > /tmp/befam-functions-health.json
          cat /tmp/befam-functions-health.json | jq -e '.ok == true' > /dev/null

      - name: Append workflow summary
        run: |
          {
            echo "## Monitoring Summary"
            echo "- Firebase project: ${FIREBASE_PROJECT_ID_RESOLVED}"
            echo "- Web base: ${WEB_BASE_URL}"
            echo "- Health endpoint: ${HEALTHCHECK_URL}"
            echo "- Result: healthy"
          } >> "$GITHUB_STEP_SUMMARY"
