name: CI - Mobile E2E iOS

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-e2e-ios-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: E2E - iOS Test Run
    runs-on: macos-latest
    timeout-minutes: 110
    env:
      E2E_MODE: debug
      E2E_PLATFORM: ios
      E2E_SUITE: smoke
      BEFAM_E2E_SKIP_GEN_L10N: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Decide whether iOS E2E is required
        id: scope
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch -> run iOS E2E."
            exit 0
          fi
          before_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          if [ -z "${before_sha}" ] || [ "${before_sha}" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git show --pretty='' --name-only "${head_sha}")"
          else
            if ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "${before_sha}" || true
            fi
            if git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
              changed_files="$(git diff --name-only "${before_sha}" "${head_sha}")"
            else
              echo "run_e2e=true" >> "$GITHUB_OUTPUT"
              echo "iOS E2E required: unable to resolve base commit ${before_sha} in shallow checkout."
              exit 0
            fi
          fi
          if printf '%s\n' "${changed_files}" | grep -Eq '^(mobile/befam/|scripts/run_mobile_e2e\.sh|\.github/workflows/mobile-e2e(\-ios)?\.yml)'; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            echo "iOS E2E required by changed files."
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "iOS E2E skipped: no mobile/e2e-related changes."
          fi

      - name: Set up Flutter
        if: ${{ steps.scope.outputs.run_e2e == 'true' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Cache iOS dependencies
        if: ${{ steps.scope.outputs.run_e2e == 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/Library/Caches/org.cocoapods.CocoaPods
            mobile/befam/ios/Pods
          key: ${{ runner.os }}-e2e-ios-deps-${{ hashFiles('mobile/befam/pubspec.lock', 'mobile/befam/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-ios-deps-

      - name: Boot iOS simulator
        if: ${{ steps.scope.outputs.run_e2e == 'true' }}
        timeout-minutes: 10
        run: |
          set -euo pipefail
          SIM_UDID="$(
            xcrun simctl list devices available -j | python3 -c 'import json,sys;payload=json.load(sys.stdin);devices=[d for runtime,entries in payload.get("devices",{}).items() if "iOS" in runtime for d in entries if d.get("isAvailable",True)];prefs=("iPhone 16 Pro","iPhone 16","iPhone 15 Pro","iPhone 15","iPhone SE");chosen=next((d for pref in prefs for d in devices if d.get("name","").startswith(pref)),None) or (devices[0] if devices else None);sys.exit(1) if chosen is None else print(chosen["udid"])'
          )"
          if [[ -z "${SIM_UDID}" ]]; then
            echo "Unable to resolve an iPhone simulator UDID from simctl JSON output."
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "${SIM_UDID}" || true
          if ! xcrun simctl bootstatus "${SIM_UDID}" -b; then
            echo "bootstatus with timeout failed. Falling back to manual polling..."
            state=""
            for _ in $(seq 1 60); do
              state="$(
                xcrun simctl list devices -j | python3 -c 'import json,sys;target=sys.argv[1].strip();payload=json.load(sys.stdin);state=next(((d.get("state") or "").strip() for entries in payload.get("devices", {}).values() for d in entries if (d.get("udid") or "").strip()==target),"");print(state)' "${SIM_UDID}"
              )"
              if [[ "${state}" == "Booted" ]]; then
                break
              fi
              sleep 5
            done
            if [[ "${state}" != "Booted" ]]; then
              echo "Simulator boot timeout. Dumping current device state..."
              xcrun simctl list devices available
              exit 1
            fi
          fi
          open -a Simulator || true
          echo "BEFAM_E2E_IOS_DEVICE=${SIM_UDID}" >> "$GITHUB_ENV"

      - name: Run iOS E2E
        if: ${{ steps.scope.outputs.run_e2e == 'true' }}
        timeout-minutes: 100
        env:
          BEFAM_E2E_TEST_PHONE: ${{ secrets.BEFAM_E2E_TEST_PHONE }}
          BEFAM_E2E_TEST_OTP: ${{ secrets.BEFAM_E2E_TEST_OTP }}
        run: |
          set -euo pipefail
          chmod +x scripts/run_mobile_e2e.sh
          python3 - <<'PY'
          import os
          import subprocess
          import sys

          mode = os.environ.get("E2E_MODE", "debug")
          suite = os.environ.get("E2E_SUITE", "smoke")
          # iOS cold builds can take >30 minutes before tests execute.
          timeout_minutes = 80 if suite == "smoke" else 95
          timeout_seconds = timeout_minutes * 60
          cmd = ["./scripts/run_mobile_e2e.sh", mode, "ios", suite]

          try:
              result = subprocess.run(cmd, timeout=timeout_seconds, check=False)
          except subprocess.TimeoutExpired:
              print(f"::error::iOS E2E timed out after {timeout_minutes} minutes (suite={suite}).")
              sys.exit(124)

          sys.exit(result.returncode)
          PY

      - name: Upload iOS E2E artifacts
        if: ${{ always() && steps.scope.outputs.run_e2e == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mobile-e2e-ios-${{ github.run_id }}
          path: |
            mobile/befam/artifacts/**
            mobile/befam/integration_test/screenshots/**
          if-no-files-found: ignore
