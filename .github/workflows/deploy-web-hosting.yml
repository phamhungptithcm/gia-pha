name: CD - Deploy Web Hosting (Production)

on:
  workflow_run:
    workflows:
      - CD - Deploy Firebase (Production)
    branches:
      - main
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-web-hosting-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  build-web:
    name: Prepare Immutable Web Bundle
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release tag from commit SHA
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_sha="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          tag="$(
            gh release list \
              --limit 100 \
              --json tagName,targetCommitish \
              --jq ".[] | select(.targetCommitish==\"${release_sha}\") | .tagName" \
              | head -n1
          )"
          if [ -z "$tag" ]; then
            echo "::error::No GitHub release tag found for commit ${release_sha}."
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download immutable web release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/web-release
          gh release download "${{ steps.release.outputs.release_tag }}" \
            --pattern "befam-*-web-release.tar.gz" \
            --dir dist/web-release
          bundle_path="$(ls dist/web-release/befam-*-web-release.tar.gz | head -n1)"
          mkdir -p mobile/befam/build/web
          tar -xzf "$bundle_path" -C mobile/befam/build/web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: befam-web-build
          path: mobile/befam/build/web

  deploy-hosting:
    name: Deploy Web Hosting (Production)
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    needs: build-web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate production OIDC configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"
          test -n "$GCP_SERVICE_ACCOUNT_EMAIL"
          test -n "$FIREBASE_PROJECT_ID"

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: befam-web-build
          path: mobile/befam/build/web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@14.19.1

      - name: Export Firebase project env
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID}"
          test -n "$project"
          echo "GOOGLE_CLOUD_PROJECT=$project" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$project" >> "$GITHUB_ENV"

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_HOSTING_TARGET: ${{ vars.FIREBASE_HOSTING_TARGET }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID}"
          target="${FIREBASE_HOSTING_TARGET:-}"
          if [ -n "$target" ]; then
            firebase deploy --project "$project" --non-interactive --only "hosting:${target}"
          else
            firebase deploy --project "$project" --non-interactive --only hosting
          fi

  notify-deploy-hosting-failure:
    name: Notify hosting deploy failure
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs:
      - build-web
      - deploy-hosting
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping notification."
            exit 0
          fi
          payload="$(cat <<JSON
          {
            "text": ":x: BeFam web hosting deploy failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*CD - Deploy Web Hosting (Production) failed*\\nRepository: ${GITHUB_REPOSITORY}\\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
                }
              }
            ]
          }
          JSON
          )"
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
