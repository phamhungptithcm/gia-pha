name: CD - Deploy Web Hosting (Production)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to deploy to production hosting (for example v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: deploy-web-hosting-${{ inputs.release_tag }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Prepare Immutable Web Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate selected release tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_TAG"
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft >/tmp/release.json
          if [ "$(jq -r '.isDraft' /tmp/release.json)" != "false" ]; then
            echo "::error::Release tag ${RELEASE_TAG} is still a draft release."
            exit 1
          fi

      - name: Download immutable web release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/web-release
          gh release download "${{ inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "befam-*-web-release.tar.gz" \
            --dir dist/web-release
          bundle_path="$(find dist/web-release -maxdepth 1 -name 'befam-*-web-release.tar.gz' -print -quit)"
          if [ -z "$bundle_path" ]; then
            echo "::error::Web release bundle not found for tag ${{ inputs.release_tag }}."
            exit 1
          fi
          mkdir -p mobile/befam/build/web
          tar -xzf "$bundle_path" -C mobile/befam/build/web

      - name: Upload web artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: befam-web-build
          path: mobile/befam/build/web

  deploy-hosting:
    name: Deploy Web Hosting (Production)
    needs:
      - build-web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Verify release tag belongs to main history
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Release tag ${{ inputs.release_tag }} does not belong to origin/main history."
            exit 1
          fi

      - name: Validate production OIDC configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          PRODUCTION_FIREBASE_PROJECT_ID: ${{ vars.PRODUCTION_FIREBASE_PROJECT_ID }}
          STAGING_FIREBASE_PROJECT_ID: ${{ vars.STAGING_FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"
          test -n "$GCP_SERVICE_ACCOUNT_EMAIL"
          test -n "$FIREBASE_PROJECT_ID"
          test -n "${PRODUCTION_FIREBASE_PROJECT_ID:-}"
          expected_project="${PRODUCTION_FIREBASE_PROJECT_ID}"
          if [ "$FIREBASE_PROJECT_ID" != "$expected_project" ]; then
            echo "::error::Production hosting deploy must target configured project ${expected_project}. Current: ${FIREBASE_PROJECT_ID}."
            exit 1
          fi
          if [ -n "${STAGING_FIREBASE_PROJECT_ID:-}" ] && [ "$FIREBASE_PROJECT_ID" = "$STAGING_FIREBASE_PROJECT_ID" ]; then
            echo "::error::Production hosting deploy must not target staging Firebase project ${STAGING_FIREBASE_PROJECT_ID}."
            exit 1
          fi

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Download web artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: befam-web-build
          path: mobile/befam/build/web

      - name: Validate web bundle app-ads.txt
        run: |
          set -euo pipefail
          bash scripts/verify_app_ads_txt.sh mobile/befam/build/web/app-ads.txt

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@14.19.1

      - name: Export Firebase project env
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID}"
          test -n "$project"
          echo "GOOGLE_CLOUD_PROJECT=$project" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$project" >> "$GITHUB_ENV"

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_HOSTING_TARGET: ${{ vars.FIREBASE_HOSTING_TARGET }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID}"
          target="${FIREBASE_HOSTING_TARGET:-}"
          firebase_config="${GITHUB_WORKSPACE}/firebase.json"
          if [ ! -f "$firebase_config" ]; then
            echo "::error::Firebase config not found at ${firebase_config}."
            exit 1
          fi
          if [ -n "$target" ]; then
            firebase deploy --project "$project" --config "$firebase_config" --non-interactive --only "hosting:${target}"
          else
            firebase deploy --project "$project" --config "$firebase_config" --non-interactive --only hosting
          fi

  notify-deploy-hosting-failure:
    name: Notify Hosting Deploy Failure
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs:
      - build-web
      - deploy-hosting
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping notification."
            exit 0
          fi
          payload="$(cat <<JSON
          {
            "text": ":x: BeFam web hosting deploy failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*CD - Deploy Web Hosting (Production) failed*\\nRepository: ${GITHUB_REPOSITORY}\\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
                }
              }
            ]
          }
          JSON
          )"
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"