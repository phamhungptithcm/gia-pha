name: CD - Deploy Staging

on:
  push:
    branches:
      - staging
    paths:
      - "firebase.json"
      - "firebase/**"
      - ".firebaserc"
      - "mobile/befam/android/**"
      - "mobile/befam/ios/**"
      - "mobile/befam/lib/**"
      - "mobile/befam/web/**"
      - "mobile/befam/assets/**"
      - "mobile/befam/pubspec.yaml"
      - "mobile/befam/pubspec.lock"
      - ".github/workflows/branch-ci.yml"
      - ".github/workflows/mobile-e2e.yml"
      - ".github/workflows/mobile-e2e-ios.yml"
      - ".github/workflows/mobile-e2e-deep.yml"
      - ".github/workflows/deploy-staging.yml"

permissions:
  contents: read
  id-token: write
  checks: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-staging-ci-e2e:
    name: Gate - Wait for Staging CI + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Wait for required checks on staging commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          required_checks=(
            "CI - Docs Validation and Build"
            "CI - Functions Build and Test"
            "CI - Mobile Build and Test"
            "Security - Trivy Filesystem Scan"
            "Security - Gitleaks Secret Scan"
            "Security - Trivy Container Image Scan"
            "E2E - Android Test Run"
            "E2E - iOS Test Run"
          )

          deadline_seconds=$((SECONDS + 90 * 60))
          check_creation_deadline_seconds=$((SECONDS + 20 * 60))

          while [ "$SECONDS" -lt "$deadline_seconds" ]; do
            echo "Checking status for commit ${COMMIT_SHA}..."
            check_runs_json="$(
              gh api \
                "repos/${GITHUB_REPOSITORY}/commits/${COMMIT_SHA}/check-runs?per_page=100" \
            )"

            all_passed=true
            saw_any_required_check=false
            for check_name in "${required_checks[@]}"; do
              line="$(
                jq -r --arg name "$check_name" '
                  (.check_runs // [])
                  | map(select(.name == $name))
                  | sort_by(.completed_at // .started_at // .created_at)
                  | last
                  | if . == null then "" else [(.name // ""), (.status // ""), (.conclusion // "")] | @tsv end
                ' <<<"$check_runs_json"
              )"
              if [ -z "$line" ]; then
                echo " - ${check_name}: missing (waiting)"
                all_passed=false
                continue
              fi

              saw_any_required_check=true

              status="$(printf '%s' "$line" | awk -F'\t' '{print $2}')"
              conclusion="$(printf '%s' "$line" | awk -F'\t' '{print $3}')"
              echo " - ${check_name}: status=${status}, conclusion=${conclusion:-n/a}"

              if [ "$status" != "completed" ]; then
                all_passed=false
                continue
              fi

              if [ "$conclusion" != "success" ]; then
                echo "::error::Required check '${check_name}' completed with conclusion '${conclusion}'."
                exit 1
              fi
            done

            if [ "$saw_any_required_check" = false ] && [ "$SECONDS" -ge "$check_creation_deadline_seconds" ]; then
              echo "::error::No required checks were created within 20 minutes for commit ${COMMIT_SHA}. Failing fast to avoid a stuck deploy gate."
              exit 1
            fi

            if [ "$all_passed" = true ]; then
              echo "All required staging CI/E2E checks are green."
              exit 0
            fi

            sleep 20
          done

          echo "::error::Timed out waiting for required staging CI/E2E checks."
          exit 1

  deploy-staging-firebase:
    name: Deploy Firebase (Staging)
    needs: gate-staging-ci-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate staging sandbox target
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          STAGING_FIREBASE_PROJECT_ID: ${{ vars.STAGING_FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID:-}"
          test -n "$project"
          expected_project="${STAGING_FIREBASE_PROJECT_ID:-}"
          if [ -n "$expected_project" ]; then
            if [ "$project" != "$expected_project" ]; then
              echo "::error::Staging deploy must target configured sandbox project ${expected_project}. Current: ${project}"
              exit 1
            fi
          else
            echo "::warning::STAGING_FIREBASE_PROJECT_ID is empty; using FIREBASE_PROJECT_ID=${project} as staging target."
          fi
          database="${FIRESTORE_DATABASE_ID:-"(default)"}"
          if [ "$database" != "(default)" ]; then
            echo "::error::Staging deploy must target Firestore database (default). Current: ${database}"
            exit 1
          fi

      - name: Resolve staging auth mode
        id: auth-mode
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && [ -n "${GCP_SERVICE_ACCOUNT_EMAIL:-}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "mode=key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::Missing staging deploy credentials. Provide OIDC secrets or FIREBASE_SERVICE_ACCOUNT."
          exit 1

      - name: Authenticate to Google Cloud (OIDC)
        if: ${{ steps.auth-mode.outputs.mode == 'oidc' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud (OIDC mode)
        if: ${{ steps.auth-mode.outputs.mode == 'oidc' }}
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Write Firebase credentials (fallback key mode)
        if: ${{ steps.auth-mode.outputs.mode == 'key' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
        run: |
          set -euo pipefail
          test -n "$FIREBASE_SERVICE_ACCOUNT"
          test -n "${FIREBASE_PROJECT_ID:-}"
          project="${FIREBASE_PROJECT_ID}"
          database="${FIRESTORE_DATABASE_ID:-"(default)"}"
          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$credentials_path"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_path" >> "$GITHUB_ENV"
          echo "GOOGLE_CLOUD_PROJECT=$project" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$project" >> "$GITHUB_ENV"
          echo "FIRESTORE_DATABASE_ID=$database" >> "$GITHUB_ENV"

      - name: Export Firebase project env (OIDC mode)
        if: ${{ steps.auth-mode.outputs.mode == 'oidc' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID:-}"
          test -n "$project"
          database="${FIRESTORE_DATABASE_ID:-"(default)"}"
          echo "GOOGLE_CLOUD_PROJECT=$project" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$project" >> "$GITHUB_ENV"
          echo "FIRESTORE_DATABASE_ID=$database" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install Functions dependencies
        working-directory: firebase/functions
        run: npm ci

      - name: Build Functions
        working-directory: firebase/functions
        run: npm run build

      - name: Write Functions runtime env file (staging)
        working-directory: firebase/functions
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          OTP_ALLOWED_DIAL_CODES: ${{ vars.OTP_ALLOWED_DIAL_CODES }}
          CALLABLE_ENFORCE_APP_CHECK: ${{ vars.CALLABLE_ENFORCE_APP_CHECK }}
          AI_ASSIST_ENABLED: ${{ vars.AI_ASSIST_ENABLED }}
          AI_ASSIST_MODEL: ${{ vars.AI_ASSIST_MODEL }}
        run: |
          set -euo pipefail
          resolved_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          resolved_firestore_database_id="${FIRESTORE_DATABASE_ID:-"(default)"}"
          resolved_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          resolved_otp_allowed_dial_codes="${OTP_ALLOWED_DIAL_CODES:-84}"
          resolved_callable_enforce_app_check="${CALLABLE_ENFORCE_APP_CHECK:-true}"
          resolved_ai_assist_enabled="${AI_ASSIST_ENABLED:-false}"
          resolved_ai_assist_model="${AI_ASSIST_MODEL:-gemini-2.5-flash-lite}"
          case "$resolved_callable_enforce_app_check" in
            true|false|1|0|yes|no) ;;
            *) echo "Unsupported CALLABLE_ENFORCE_APP_CHECK: $resolved_callable_enforce_app_check"; exit 1 ;;
          esac
          case "$resolved_ai_assist_enabled" in
            true|false|1|0|yes|no) ;;
            *) echo "Unsupported AI_ASSIST_ENABLED: $resolved_ai_assist_enabled"; exit 1 ;;
          esac
          test -n "$resolved_ai_assist_model"
          env_file=".env.${FIREBASE_PROJECT_ID}"
          cat > "$env_file" <<EOF
          APP_REGION=${resolved_region}
          FIRESTORE_DATABASE_ID=${resolved_firestore_database_id}
          APP_TIMEZONE=${resolved_timezone}
          CALLABLE_ENFORCE_APP_CHECK=${resolved_callable_enforce_app_check}
          AI_ASSIST_ENABLED=${resolved_ai_assist_enabled}
          AI_ASSIST_MODEL=${resolved_ai_assist_model}
          OTP_PROVIDER=firebase
          OTP_ALLOWED_DIAL_CODES=${resolved_otp_allowed_dial_codes}
          EOF
          echo "Wrote staging runtime env file: firebase/functions/$env_file"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@14.19.1

      - name: Sync AI secret to Firebase Secret Manager (staging)
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          AI_ASSIST_ENABLED: ${{ vars.AI_ASSIST_ENABLED }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$FIREBASE_PROJECT_ID"
          resolved_ai_assist_enabled="${AI_ASSIST_ENABLED:-false}"
          case "$resolved_ai_assist_enabled" in
            true|false|1|0|yes|no) ;;
            *) echo "Unsupported AI_ASSIST_ENABLED: $resolved_ai_assist_enabled"; exit 1 ;;
          esac
          case "$resolved_ai_assist_enabled" in
            true|1|yes)
              test -n "$GOOGLE_GENAI_API_KEY" || {
                echo "GOOGLE_GENAI_API_KEY is required when AI_ASSIST_ENABLED=true."
                exit 1
              }
              secret_file="$(mktemp)"
              trap 'rm -f "$secret_file"' EXIT
              echo "::add-mask::$GOOGLE_GENAI_API_KEY"
              printf '%s' "$GOOGLE_GENAI_API_KEY" > "$secret_file"
              firebase functions:secrets:set GOOGLE_GENAI_API_KEY \
                --project "$FIREBASE_PROJECT_ID" \
                --data-file "$secret_file"
              ;;
            *)
              echo "AI assist disabled for staging; skipping GOOGLE_GENAI_API_KEY sync."
              ;;
          esac

      - name: Sync runtime config document
        working-directory: firebase/functions
        run: node scripts/upsert-runtime-config.mjs

      - name: Sync subscription package catalog
        working-directory: firebase/functions
        run: node scripts/sync-subscription-packages.mjs --apply

      - name: Deploy Firestore, Storage, and Functions
        run: >
          firebase deploy
          --project "${FIREBASE_PROJECT_ID}"
          --non-interactive
          --only firestore:rules,firestore:indexes,storage,functions

      - name: Remove runtime env file (staging)
        if: ${{ always() }}
        working-directory: firebase/functions
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: rm -f ".env.${FIREBASE_PROJECT_ID}"

  deploy-staging-web:
    name: Deploy Web Hosting (Staging)
    needs: deploy-staging-firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate staging sandbox target
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          STAGING_FIREBASE_PROJECT_ID: ${{ vars.STAGING_FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID:-}"
          test -n "$project"
          expected_project="${STAGING_FIREBASE_PROJECT_ID:-}"
          if [ -n "$expected_project" ]; then
            if [ "$project" != "$expected_project" ]; then
              echo "::error::Staging deploy must target configured sandbox project ${expected_project}. Current: ${project}"
              exit 1
            fi
          else
            echo "::warning::STAGING_FIREBASE_PROJECT_ID is empty; using FIREBASE_PROJECT_ID=${project} as staging target."
          fi
          database="${FIRESTORE_DATABASE_ID:-"(default)"}"
          if [ "$database" != "(default)" ]; then
            echo "::error::Staging deploy must target Firestore database (default). Current: ${database}"
            exit 1
          fi

      - name: Resolve staging auth mode
        id: auth-mode
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && [ -n "${GCP_SERVICE_ACCOUNT_EMAIL:-}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "mode=key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::Missing staging deploy credentials. Provide OIDC secrets or FIREBASE_SERVICE_ACCOUNT."
          exit 1

      - name: Authenticate to Google Cloud (OIDC)
        if: ${{ steps.auth-mode.outputs.mode == 'oidc' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud (OIDC mode)
        if: ${{ steps.auth-mode.outputs.mode == 'oidc' }}
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Write Firebase credentials (fallback key mode)
        if: ${{ steps.auth-mode.outputs.mode == 'key' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
        run: |
          set -euo pipefail
          test -n "${FIREBASE_PROJECT_ID:-}"
          project="${FIREBASE_PROJECT_ID}"
          database="${FIRESTORE_DATABASE_ID:-"(default)"}"
          test -n "${FIREBASE_SERVICE_ACCOUNT:-}"
          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$credentials_path"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_path" >> "$GITHUB_ENV"
          echo "GOOGLE_CLOUD_PROJECT=$project" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$project" >> "$GITHUB_ENV"
          echo "FIRESTORE_DATABASE_ID=$database" >> "$GITHUB_ENV"

      - name: Export Firebase project env (OIDC mode)
        if: ${{ steps.auth-mode.outputs.mode == 'oidc' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID:-}"
          test -n "$project"
          database="${FIRESTORE_DATABASE_ID:-"(default)"}"
          echo "GOOGLE_CLOUD_PROJECT=$project" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$project" >> "$GITHUB_ENV"
          echo "FIRESTORE_DATABASE_ID=$database" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Build Flutter web
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_WEB_BASE_URL: ${{ vars.BEFAM_WEB_BASE_URL }}
          BEFAM_OTP_PROVIDER: ${{ vars.BEFAM_OTP_PROVIDER }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          BEFAM_IOS_APP_STORE_URL: ${{ vars.BEFAM_IOS_APP_STORE_URL }}
          BEFAM_ANDROID_PLAY_STORE_URL: ${{ vars.BEFAM_ANDROID_PLAY_STORE_URL }}
        run: |
          set -euo pipefail
          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-false}"
          otp_provider="${BEFAM_OTP_PROVIDER:-firebase}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          if [ "$allow_bundled" != "false" ]; then
            echo "::error::Staging web builds must set BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=false. Current: ${allow_bundled}"
            exit 1
          fi
          if [ "$otp_provider" != "firebase" ]; then
            echo "::error::Staging web builds must use BEFAM_OTP_PROVIDER=firebase. Current: ${otp_provider}"
            exit 1
          fi
          required_web_keys=(
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
          )
          for key in "${required_web_keys[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required staging web var: ${key}"
              exit 1
            fi
          done
          web_base_url="${BEFAM_WEB_BASE_URL:-}"
          if [ -z "$web_base_url" ] && [ -n "${BEFAM_FIREBASE_PROJECT_ID:-}" ]; then
            web_base_url="https://${BEFAM_FIREBASE_PROJECT_ID}.web.app"
          fi
          ../../scripts/render_web_metadata.sh "$web_base_url"
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
            BEFAM_IOS_APP_STORE_URL
            BEFAM_ANDROID_PLAY_STORE_URL
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done
          flutter build web \
            --release \
            --no-wasm-dry-run \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_OTP_PROVIDER="${otp_provider}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@14.19.1

      - name: Deploy Firebase Hosting
        working-directory: ${{ github.workspace }}
        env:
          FIREBASE_HOSTING_TARGET: ${{ vars.FIREBASE_HOSTING_TARGET }}
        run: |
          set -euo pipefail
          project="${FIREBASE_PROJECT_ID}"
          target="${FIREBASE_HOSTING_TARGET:-}"
          firebase_config="${GITHUB_WORKSPACE}/firebase.json"
          if [ ! -f "$firebase_config" ]; then
            echo "::error::Firebase config not found at ${firebase_config}."
            exit 1
          fi
          if [ -n "$target" ]; then
            firebase deploy --project "$project" --config "$firebase_config" --non-interactive --only "hosting:${target}"
          else
            firebase deploy --project "$project" --config "$firebase_config" --non-interactive --only hosting
          fi

  preflight-staging-mobile-signing:
    name: Preflight - Staging Mobile Signing
    needs: deploy-staging-web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
    steps:
      - name: Validate staging mobile signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_KEYSTORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
            IOS_P12_BASE64
            IOS_P12_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_TEAM_ID
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required staging signing secret: ${key}"
              exit 1
            fi
          done

  preflight-staging-mobile-release-policy:
    name: Preflight - Staging Mobile Release Policy
    needs: preflight-staging-mobile-signing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
    steps:
      - name: Validate staging release channels are non-production
        env:
          STAGING_MOBILE_PUBLISH_ENABLED: ${{ vars.STAGING_MOBILE_PUBLISH_ENABLED }}
          STAGING_ANDROID_RELEASE_TRACK: ${{ vars.STAGING_ANDROID_RELEASE_TRACK }}
          STAGING_IOS_RELEASE_CHANNEL: ${{ vars.STAGING_IOS_RELEASE_CHANNEL }}
          STAGING_ANDROID_CLOSED_TRACK_NAME: ${{ vars.STAGING_ANDROID_CLOSED_TRACK_NAME }}
        run: |
          set -euo pipefail

          publish_enabled="${STAGING_MOBILE_PUBLISH_ENABLED:-false}"
          android_track="${STAGING_ANDROID_RELEASE_TRACK:-internal}"
          ios_channel="${STAGING_IOS_RELEASE_CHANNEL:-testflight}"

          case "$publish_enabled" in
            true|false)
              ;;
            *)
              echo "::error::Invalid STAGING_MOBILE_PUBLISH_ENABLED=${publish_enabled}. Allowed values: true, false"
              exit 1
              ;;
          esac

          case "$android_track" in
            internal|closed)
              ;;
            *)
              echo "::error::Invalid STAGING_ANDROID_RELEASE_TRACK=${android_track}. Allowed values: internal, closed"
              exit 1
              ;;
          esac

          if [ "$android_track" = "closed" ] && [ -z "${STAGING_ANDROID_CLOSED_TRACK_NAME:-}" ]; then
            echo "::warning::STAGING_ANDROID_CLOSED_TRACK_NAME is not set. Play upload will fallback to track=beta."
          fi

          case "$ios_channel" in
            testflight)
              ;;
            *)
              echo "::error::Invalid STAGING_IOS_RELEASE_CHANNEL=${ios_channel}. Allowed value: testflight"
              exit 1
              ;;
          esac

          echo "Staging release policy guard passed. publishEnabled=${publish_enabled}, Android track=${android_track}, iOS channel=${ios_channel}"

      - name: Validate staging store publish credentials
        if: ${{ vars.STAGING_MOBILE_PUBLISH_ENABLED == 'true' }}
        env:
          GOOGLE_PLAY_PACKAGE_NAME: ${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_PLAY_PACKAGE_NAME:-}" ]; then
            echo "::error::Missing required staging var: GOOGLE_PLAY_PACKAGE_NAME"
            exit 1
          fi

          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ] && [ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "::error::Missing Google Play credential. Set GOOGLE_PLAY_SERVICE_ACCOUNT_JSON (preferred) or FIREBASE_SERVICE_ACCOUNT."
            exit 1
          fi

          for key in APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_PRIVATE_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required TestFlight secret: ${key}"
              exit 1
            fi
          done

          echo "Staging store publish credential guard passed."

  build-android-release-staging:
    name: Build Android Release AAB (Staging Test)
    needs: preflight-staging-mobile-release-policy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: staging
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Decode Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          keystore_path="$RUNNER_TEMP/android-release.keystore"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build Android release AAB (staging)
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_OTP_PROVIDER: ${{ vars.BEFAM_OTP_PROVIDER }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          BEFAM_IOS_APP_STORE_URL: ${{ vars.BEFAM_IOS_APP_STORE_URL }}
          BEFAM_ANDROID_PLAY_STORE_URL: ${{ vars.BEFAM_ANDROID_PLAY_STORE_URL }}
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          app_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml | cut -d'+' -f1)"
          if [ -z "$app_version" ]; then
            echo "::error::Unable to resolve app version from pubspec.yaml"
            exit 1
          fi

          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-true}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          otp_provider="${BEFAM_OTP_PROVIDER:-firebase}"
          if [ "$otp_provider" != "firebase" ]; then
            echo "::error::Staging release builds must use BEFAM_OTP_PROVIDER=firebase. Current: ${otp_provider}"
            exit 1
          fi

          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
            BEFAM_IOS_APP_STORE_URL
            BEFAM_ANDROID_PLAY_STORE_URL
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done

          flutter build appbundle \
            --release \
            --build-name "$app_version" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_OTP_PROVIDER="${otp_provider}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Upload Android staging release AAB
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-staging-release-aab-${{ github.run_id }}
          path: mobile/befam/build/app/outputs/bundle/release/app-release.aab

  build-ios-release-staging:
    name: Build iOS Release IPA (Staging Test)
    needs: preflight-staging-mobile-release-policy
    runs-on: macos-latest
    timeout-minutes: 60
    environment:
      name: staging
    env:
      COCOAPODS_DISABLE_STATS: "true"
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: mobile/befam/ios
        run: pod install

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Import iOS signing certificate and provisioning profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/befam-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          cert_path="$RUNNER_TEMP/signing-cert.p12"
          profile_path="$RUNNER_TEMP/befam.mobileprovision"
          profile_plist="$RUNNER_TEMP/befam-profile.plist"

          echo "$IOS_P12_BASE64" | base64 --decode > "$cert_path"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -s "$keychain_path"

          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$IOS_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" "$profile_plist")
          profile_name=$(/usr/libexec/PlistBuddy -c "Print Name" "$profile_plist")
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"

          echo "IOS_SIGNING_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "IOS_SIGNING_KEYCHAIN_PASSWORD=$keychain_password" >> "$GITHUB_ENV"
          echo "IOS_PROVISIONING_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"

      - name: Build iOS signed release IPA (staging)
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_OTP_PROVIDER: ${{ vars.BEFAM_OTP_PROVIDER }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          BEFAM_IOS_APP_STORE_URL: ${{ vars.BEFAM_IOS_APP_STORE_URL }}
          BEFAM_ANDROID_PLAY_STORE_URL: ${{ vars.BEFAM_ANDROID_PLAY_STORE_URL }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ env.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          app_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml | cut -d'+' -f1)"
          if [ -z "$app_version" ]; then
            echo "::error::Unable to resolve app version from pubspec.yaml"
            exit 1
          fi

          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-true}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          otp_provider="${BEFAM_OTP_PROVIDER:-firebase}"
          if [ "$otp_provider" != "firebase" ]; then
            echo "::error::Staging release builds must use BEFAM_OTP_PROVIDER=firebase. Current: ${otp_provider}"
            exit 1
          fi

          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
            BEFAM_IOS_APP_STORE_URL
            BEFAM_ANDROID_PLAY_STORE_URL
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done

          bundle_id="${BEFAM_FIREBASE_IOS_BUNDLE_ID:-}"
          if [ -z "$bundle_id" ]; then
            echo "::error::Missing required staging var: BEFAM_FIREBASE_IOS_BUNDLE_ID"
            exit 1
          fi
          export_options_plist="ios/ExportOptions.plist"
          cat > "${export_options_plist}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${bundle_id}</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          flutter build ipa \
            --release \
            --build-name "${app_version}" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --export-options-plist="${export_options_plist}" \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_OTP_PROVIDER="${otp_provider}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Package signed iOS staging IPA
        run: |
          set -euo pipefail
          app_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml | cut -d'+' -f1)"
          ipa_path="build/ios/ipa/Runner.ipa"
          output_dir="${GITHUB_WORKSPACE}/dist/ios"
          asset_name="befam-${app_version}-staging-ios-release.ipa"

          if [ ! -f "${ipa_path}" ]; then
            echo "Expected signed iOS IPA not found at ${ipa_path}" >&2
            exit 1
          fi

          mkdir -p "${output_dir}"
          cp "${ipa_path}" "${output_dir}/${asset_name}"

      - name: Upload signed iOS staging IPA
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-staging-release-ipa-${{ github.run_id }}
          path: dist/ios/*.ipa

  publish-android-staging:
    name: Publish Android Staging Track
    if: ${{ vars.STAGING_MOBILE_PUBLISH_ENABLED == 'true' }}
    needs:
      - preflight-staging-mobile-release-policy
      - build-android-release-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
    steps:
      - name: Download Android staging release AAB
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-staging-release-aab-${{ github.run_id }}
          path: dist/android

      - name: Resolve Google Play credential for upload
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          service_account_json="${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}"
          if [ -z "$service_account_json" ]; then
            service_account_json="${FIREBASE_SERVICE_ACCOUNT:-}"
          fi
          if [ -z "$service_account_json" ]; then
            echo "::error::Missing Google Play credential secret (GOOGLE_PLAY_SERVICE_ACCOUNT_JSON or FIREBASE_SERVICE_ACCOUNT)."
            exit 1
          fi
          echo "::add-mask::$service_account_json"
          {
            echo "GOOGLE_PLAY_UPLOAD_SERVICE_ACCOUNT_JSON<<EOF"
            echo "$service_account_json"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Resolve Android staging release track
        env:
          STAGING_ANDROID_RELEASE_TRACK: ${{ vars.STAGING_ANDROID_RELEASE_TRACK }}
          STAGING_ANDROID_CLOSED_TRACK_NAME: ${{ vars.STAGING_ANDROID_CLOSED_TRACK_NAME }}
        run: |
          set -euo pipefail
          track="${STAGING_ANDROID_RELEASE_TRACK:-internal}"
          if [ "$track" = "closed" ]; then
            track="${STAGING_ANDROID_CLOSED_TRACK_NAME:-beta}"
          fi
          if [ "$track" = "production" ]; then
            echo "::error::Staging workflow cannot publish to production track."
            exit 1
          fi
          echo "ANDROID_PLAY_TRACK=$track" >> "$GITHUB_ENV"
          echo "Resolved Android Play track=${track}"

      - name: Upload Android AAB to Google Play staging track
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_UPLOAD_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}
          releaseFiles: dist/android/*.aab
          track: ${{ env.ANDROID_PLAY_TRACK }}
          status: completed
          changesNotSentForReview: true
          releaseName: staging-${{ github.run_number }}.${{ github.run_attempt }}

  publish-ios-staging:
    name: Publish iOS Staging TestFlight
    if: ${{ vars.STAGING_MOBILE_PUBLISH_ENABLED == 'true' }}
    needs:
      - preflight-staging-mobile-release-policy
      - build-ios-release-staging
    runs-on: macos-latest
    timeout-minutes: 25
    environment:
      name: staging
    steps:
      - name: Download iOS staging IPA artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ios-staging-release-ipa-${{ github.run_id }}
          path: dist/ios

      - name: Resolve iOS staging IPA path
        run: |
          set -euo pipefail
          ipa_path="$(find dist/ios -maxdepth 2 -name '*.ipa' | head -n1)"
          if [ -z "$ipa_path" ]; then
            echo "::error::No IPA artifact found in dist/ios."
            exit 1
          fi
          echo "IOS_STAGING_IPA_PATH=$ipa_path" >> "$GITHUB_ENV"

      - name: Upload iOS IPA to TestFlight (staging)
        uses: apple-actions/upload-testflight-build@1fb41afa66075b5d62c79cb623c6c4999334e185 # v4
        with:
          app-path: ${{ env.IOS_STAGING_IPA_PATH }}
          app-type: ios
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
