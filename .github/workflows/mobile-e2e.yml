name: CI - Mobile E2E (PR)

on:
  pull_request:
    branches:
      - staging
      - main
    paths:
      - mobile/befam/**
      - firebase/functions/scripts/seed-debug-login-profiles.mjs
      - scripts/run_mobile_e2e.sh
      - .github/workflows/mobile-e2e.yml

permissions:
  contents: read

concurrency:
  group: mobile-e2e-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  resolve-config:
    name: E2E - Resolve Test Configuration
    runs-on: ubuntu-latest
    outputs:
      e2e_mode: ${{ steps.resolve.outputs.e2e_mode }}
      e2e_platform: ${{ steps.resolve.outputs.e2e_platform }}
      e2e_suite: ${{ steps.resolve.outputs.e2e_suite }}
    steps:
      - name: Resolve workflow config
        id: resolve
        run: |
          echo "e2e_mode=debug" >> "$GITHUB_OUTPUT"
          echo "e2e_platform=android" >> "$GITHUB_OUTPUT"
          echo "e2e_suite=smoke" >> "$GITHUB_OUTPUT"

  e2e-android:
    name: E2E - Android Test Run
    needs: resolve-config
    if: ${{ needs.resolve-config.outputs.e2e_platform == 'android' || needs.resolve-config.outputs.e2e_platform == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      E2E_MODE: ${{ needs.resolve-config.outputs.e2e_mode }}
      E2E_PLATFORM: ${{ needs.resolve-config.outputs.e2e_platform }}
      E2E_SUITE: ${{ needs.resolve-config.outputs.e2e_suite }}
      BEFAM_E2E_SKIP_GEN_L10N: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable KVM acceleration
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Android Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-e2e-gradle-${{ hashFiles('mobile/befam/android/**/*.gradle*', 'mobile/befam/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-e2e-gradle-

      - name: Run Android E2E
        uses: reactivecircus/android-emulator-runner@v2
        env:
          BEFAM_E2E_TEST_PHONE: ${{ secrets.BEFAM_E2E_TEST_PHONE }}
          BEFAM_E2E_TEST_OTP: ${{ secrets.BEFAM_E2E_TEST_OTP }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_5
          emulator-boot-timeout: 900
          disable-linux-hw-accel: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics
          disable-animations: true
          script: |
            set -eu
            adb start-server
            adb wait-for-device
            adb devices
            chmod +x scripts/run_mobile_e2e.sh
            bash -lc 'set +e; if [ "$E2E_SUITE" = "smoke" ]; then max_minutes=20; else max_minutes=30; fi; timeout "${max_minutes}m" ./scripts/run_mobile_e2e.sh "$E2E_MODE" android "$E2E_SUITE"; exit_code=$?; if [ "$exit_code" -eq 124 ]; then echo "::error::Android E2E timed out after ${max_minutes} minutes (suite=$E2E_SUITE)."; fi; exit "$exit_code"'

      - name: Upload Android E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-android-${{ github.run_id }}
          path: |
            mobile/befam/artifacts/**
            mobile/befam/integration_test/screenshots/**
          if-no-files-found: ignore

  e2e-ios:
    name: E2E - iOS Test Run
    needs: resolve-config
    if: ${{ needs.resolve-config.outputs.e2e_platform == 'ios' || needs.resolve-config.outputs.e2e_platform == 'both' }}
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      E2E_MODE: ${{ needs.resolve-config.outputs.e2e_mode }}
      E2E_PLATFORM: ${{ needs.resolve-config.outputs.e2e_platform }}
      E2E_SUITE: ${{ needs.resolve-config.outputs.e2e_suite }}
      BEFAM_E2E_SKIP_GEN_L10N: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache iOS dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/Library/Caches/org.cocoapods.CocoaPods
            mobile/befam/ios/Pods
          key: ${{ runner.os }}-e2e-ios-deps-${{ hashFiles('mobile/befam/pubspec.lock', 'mobile/befam/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-ios-deps-

      - name: Boot iOS simulator
        timeout-minutes: 10
        run: |
          set -euo pipefail
          SIM_UDID="$(
            xcrun simctl list devices available -j | python3 -c 'import json,sys;payload=json.load(sys.stdin);devices=[d for runtime,entries in payload.get("devices",{}).items() if "iOS" in runtime for d in entries if d.get("isAvailable",True)];prefs=("iPhone 16 Pro","iPhone 16","iPhone 15 Pro","iPhone 15","iPhone SE");chosen=next((d for pref in prefs for d in devices if d.get("name","").startswith(pref)),None) or (devices[0] if devices else None);sys.exit(1) if chosen is None else print(chosen["udid"])'
          )"
          if [[ -z "${SIM_UDID}" ]]; then
            echo "Unable to resolve an iPhone simulator UDID from simctl JSON output."
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "${SIM_UDID}" || true
          if ! xcrun simctl bootstatus "${SIM_UDID}" -b; then
            echo "bootstatus with timeout failed. Falling back to manual polling..."
            state=""
            for _ in $(seq 1 60); do
              state="$(
                xcrun simctl list devices -j | python3 -c 'import json,sys;target=sys.argv[1].strip();payload=json.load(sys.stdin);state=next(((d.get("state") or "").strip() for entries in payload.get("devices", {}).values() for d in entries if (d.get("udid") or "").strip()==target),"");print(state)' "${SIM_UDID}"
              )"
              if [[ "${state}" == "Booted" ]]; then
                break
              fi
              sleep 5
            done
            if [[ "${state}" != "Booted" ]]; then
              echo "Simulator boot timeout. Dumping current device state..."
              xcrun simctl list devices available
              exit 1
            fi
          fi
          open -a Simulator || true
          echo "BEFAM_E2E_IOS_DEVICE=${SIM_UDID}" >> "$GITHUB_ENV"

      - name: Run iOS E2E
        timeout-minutes: 52
        env:
          BEFAM_E2E_TEST_PHONE: ${{ secrets.BEFAM_E2E_TEST_PHONE }}
          BEFAM_E2E_TEST_OTP: ${{ secrets.BEFAM_E2E_TEST_OTP }}
        run: |
          set -euo pipefail
          chmod +x scripts/run_mobile_e2e.sh
          python3 - <<'PY'
          import os
          import subprocess
          import sys

          mode = os.environ.get("E2E_MODE", "debug")
          suite = os.environ.get("E2E_SUITE", "full")
          timeout_seconds = 30 * 60 if suite == "smoke" else 45 * 60
          cmd = ["./scripts/run_mobile_e2e.sh", mode, "ios", suite]

          try:
              result = subprocess.run(cmd, timeout=timeout_seconds, check=False)
          except subprocess.TimeoutExpired:
              timeout_minutes = timeout_seconds // 60
              print(f"::error::iOS E2E timed out after {timeout_minutes} minutes (suite={suite}).")
              sys.exit(124)

          sys.exit(result.returncode)
          PY

      - name: Upload iOS E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-ios-${{ github.run_id }}
          path: |
            mobile/befam/artifacts/**
            mobile/befam/integration_test/screenshots/**
          if-no-files-found: ignore
