name: CI - Mobile E2E Android

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-e2e-android-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e-android:
    name: E2E - Android Test Run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Temporarily skip Android E2E
        run: echo "::notice::Temporarily skipping Android E2E while CI is focused on build and release."
