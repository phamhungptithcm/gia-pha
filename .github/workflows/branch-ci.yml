name: Branch CI

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: branch-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-docs:
    name: ci-docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Validate rules documentation
        run: python3 scripts/validate_rules_documentation.py

      - name: Build docs
        run: mkdocs build --strict

  ci-functions:
    name: ci-functions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Build Functions
        run: npm run build

      - name: Build Firebase tooling image
        working-directory: ${{ github.workspace }}
        run: |
          docker build \
            --file docker/firebase-tools.Dockerfile \
            --build-arg RELEASE_VERSION=0.0.0-ci \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --tag befam-firebase-tools:test \
            .

  ci-mobile:
    name: ci-mobile
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build Android release APK
        run: flutter build apk --release --build-name 0.0.0 --build-number 1

      - name: Build mobile release image
        working-directory: ${{ github.workspace }}
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg RELEASE_VERSION=0.0.0-ci \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --tag befam-mobile-builder:test \
            .
