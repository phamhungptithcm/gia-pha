name: CI - Branch Quality Gates

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: branch-ci-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci-docs:
    name: CI - Docs Validation and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Validate rules documentation
        run: python3 scripts/validate_rules_documentation.py

      - name: Build docs
        run: mkdocs build --strict

  ci-functions:
    name: CI - Functions Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Build Functions
        run: npm run build

      - name: Enforce Functions dead-code gate
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters

      - name: Run Functions contract tests
        run: npm test

      - name: Prepare Docker auth for public registry pulls
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          docker_config_dir="$RUNNER_TEMP/docker-config-anon-functions"
          mkdir -p "$docker_config_dir"
          printf '{"auths":{}}\n' > "$docker_config_dir/config.json"
          echo "DOCKER_CONFIG=$docker_config_dir" >> "$GITHUB_ENV"
          docker logout docker.io >/dev/null 2>&1 || true

      - name: Build Firebase tooling image
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if docker build \
              --file docker/firebase-tools.Dockerfile \
              --build-arg RELEASE_VERSION=0.0.0-ci \
              --build-arg VCS_REF="${GITHUB_SHA}" \
              --tag befam-firebase-tools:test \
              .; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to build Firebase tooling image after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

  ci-mobile:
    name: CI - Mobile Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile/befam
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Enforce Dart dead-code gate
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run Flutter tests
        run: flutter test --coverage --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true

      - name: Enforce Flutter coverage gate
        env:
          MOBILE_MIN_COVERAGE_PERCENT: ${{ vars.MOBILE_MIN_COVERAGE_PERCENT }}
        run: |
          set -euo pipefail
          min="${MOBILE_MIN_COVERAGE_PERCENT:-40}"
          coverage_file="coverage/lcov.info"
          if [ ! -f "$coverage_file" ]; then
            echo "::error::Missing coverage report at ${coverage_file}"
            exit 1
          fi
          actual="$(awk -F: '
            /^LF:/ { lf += $2 }
            /^LH:/ { lh += $2 }
            END {
              if (lf <= 0) {
                print "0.00";
                exit;
              }
              printf "%.2f", (100 * lh / lf);
            }' "$coverage_file")"
          echo "Flutter coverage: ${actual}% (minimum ${min}%)"
          awk -v actual="$actual" -v min="$min" 'BEGIN { exit (actual + 0 >= min + 0 ? 0 : 1) }' || {
            echo "::error::Flutter coverage gate failed: ${actual}% < ${min}%"
            exit 1
          }

      - name: Run Flutter E2E release catalog contract
        run: flutter test integration_test/e2e_release_catalog_contract_test.dart -d flutter-tester --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true --dart-define=BEFAM_ENABLE_APP_CHECK=false

      - name: Run Flutter web smoke tests
        run: xvfb-run -a flutter test --platform chrome --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS=true test/app/web/web_marketing_pages_test.dart

      - name: Build Flutter web
        env:
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          BEFAM_INVALID_CHECKOUT_HOSTS: ${{ vars.BEFAM_INVALID_CHECKOUT_HOSTS }}
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_WEB_BASE_URL: ${{ vars.BEFAM_WEB_BASE_URL }}
          BEFAM_OTP_PROVIDER: ${{ vars.BEFAM_OTP_PROVIDER }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          BEFAM_IOS_APP_STORE_URL: ${{ vars.BEFAM_IOS_APP_STORE_URL }}
          BEFAM_ANDROID_PLAY_STORE_URL: ${{ vars.BEFAM_ANDROID_PLAY_STORE_URL }}
        run: |
          befam_region="${FIREBASE_FUNCTIONS_REGION:-asia-southeast1}"
          befam_timezone="${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
          invalid_hosts="${BEFAM_INVALID_CHECKOUT_HOSTS:-example.com}"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-true}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
            BEFAM_IOS_APP_STORE_URL
            BEFAM_ANDROID_PLAY_STORE_URL
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done
          otp_provider="${BEFAM_OTP_PROVIDER:-firebase}"
          if [ "$otp_provider" != "firebase" ]; then
            echo "::error::Branch CI builds must use BEFAM_OTP_PROVIDER=firebase. Current: ${otp_provider}"
            exit 1
          fi
          web_base_url="${BEFAM_WEB_BASE_URL:-}"
          if [ -z "$web_base_url" ] && [ -n "${BEFAM_FIREBASE_PROJECT_ID:-}" ]; then
            web_base_url="https://${BEFAM_FIREBASE_PROJECT_ID}.web.app"
          fi
          ../../scripts/render_web_metadata.sh "$web_base_url"
          flutter build web \
            --release \
            --no-wasm-dry-run \
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}" \
            --dart-define=BEFAM_OTP_PROVIDER="${otp_provider}" \
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false \
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}" \
            --dart-define=BEFAM_FIREBASE_FUNCTIONS_REGION="${befam_region}" \
            --dart-define=BEFAM_DEFAULT_TIMEZONE="${befam_timezone}" \
            --dart-define=BEFAM_INVALID_CHECKOUT_HOSTS="${invalid_hosts}" \
            "${optional_firebase_defines[@]}"

      - name: Build Android AAB
        env:
          BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS: ${{ vars.BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS }}
          BEFAM_FIREBASE_PROJECT_ID: ${{ vars.BEFAM_FIREBASE_PROJECT_ID }}
          BEFAM_FIREBASE_STORAGE_BUCKET: ${{ vars.BEFAM_FIREBASE_STORAGE_BUCKET }}
          BEFAM_FIREBASE_ANDROID_API_KEY: ${{ vars.BEFAM_FIREBASE_ANDROID_API_KEY }}
          BEFAM_FIREBASE_ANDROID_APP_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_APP_ID }}
          BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_API_KEY: ${{ vars.BEFAM_FIREBASE_IOS_API_KEY }}
          BEFAM_FIREBASE_IOS_APP_ID: ${{ vars.BEFAM_FIREBASE_IOS_APP_ID }}
          BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_IOS_BUNDLE_ID: ${{ vars.BEFAM_FIREBASE_IOS_BUNDLE_ID }}
          BEFAM_FIREBASE_WEB_API_KEY: ${{ vars.BEFAM_FIREBASE_WEB_API_KEY }}
          BEFAM_FIREBASE_WEB_APP_ID: ${{ vars.BEFAM_FIREBASE_WEB_APP_ID }}
          BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID: ${{ vars.BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID }}
          BEFAM_FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.BEFAM_FIREBASE_WEB_AUTH_DOMAIN }}
          BEFAM_FIREBASE_WEB_MEASUREMENT_ID: ${{ vars.BEFAM_FIREBASE_WEB_MEASUREMENT_ID }}
          BEFAM_ENABLE_APP_CHECK: ${{ vars.BEFAM_ENABLE_APP_CHECK }}
          BEFAM_OTP_PROVIDER: ${{ vars.BEFAM_OTP_PROVIDER }}
          BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY: ${{ vars.BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY }}
          BEFAM_BILLING_PENDING_TIMEOUT_MINUTES: ${{ vars.BEFAM_BILLING_PENDING_TIMEOUT_MINUTES }}
          BEFAM_IOS_APP_STORE_URL: ${{ vars.BEFAM_IOS_APP_STORE_URL }}
          BEFAM_ANDROID_PLAY_STORE_URL: ${{ vars.BEFAM_ANDROID_PLAY_STORE_URL }}
        run: |
          android_test_admob_app_id="ca-app-pub-3940256099942544~3347511713"
          allow_bundled="${BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS:-true}"
          enable_app_check="${BEFAM_ENABLE_APP_CHECK:-true}"
          firebase_define_keys=(
            BEFAM_APP_CHECK_WEB_RECAPTCHA_SITE_KEY
            BEFAM_FIREBASE_PROJECT_ID
            BEFAM_FIREBASE_STORAGE_BUCKET
            BEFAM_FIREBASE_ANDROID_API_KEY
            BEFAM_FIREBASE_ANDROID_APP_ID
            BEFAM_FIREBASE_ANDROID_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_API_KEY
            BEFAM_FIREBASE_IOS_APP_ID
            BEFAM_FIREBASE_IOS_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_IOS_BUNDLE_ID
            BEFAM_FIREBASE_WEB_API_KEY
            BEFAM_FIREBASE_WEB_APP_ID
            BEFAM_FIREBASE_WEB_MESSAGING_SENDER_ID
            BEFAM_FIREBASE_WEB_AUTH_DOMAIN
            BEFAM_FIREBASE_WEB_MEASUREMENT_ID
            BEFAM_BILLING_PENDING_TIMEOUT_MINUTES
            BEFAM_IOS_APP_STORE_URL
            BEFAM_ANDROID_PLAY_STORE_URL
          )
          optional_firebase_defines=()
          for key in "${firebase_define_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              optional_firebase_defines+=(--dart-define="${key}=${value}")
            fi
          done
          otp_provider="${BEFAM_OTP_PROVIDER:-firebase}"
          if [ "$otp_provider" != "firebase" ]; then
            echo "::error::Branch CI builds must use BEFAM_OTP_PROVIDER=firebase. Current: ${otp_provider}"
            exit 1
          fi
          # Branch CI only performs compile validation; production AdMob enforcement stays in release-main.
          export ANDROID_ADMOB_APPLICATION_ID="$android_test_admob_app_id"
          export ALLOW_TEST_ADMOB_APP_IDS="true"
          build_common_args=(
            --build-name 0.0.0
            --build-number 1
            --dart-define=BEFAM_ALLOW_BUNDLED_FIREBASE_OPTIONS="${allow_bundled}"
            --dart-define=BEFAM_OTP_PROVIDER="${otp_provider}"
            --dart-define=BEFAM_ALLOW_FIREBASE_PHONE_FALLBACK=false
            --dart-define=BEFAM_ENABLE_APP_CHECK="${enable_app_check}"
            "${optional_firebase_defines[@]}"
          )
          # CI only needs compile validation; use ephemeral signing to avoid exposing release secrets in PR context.
          temp_keystore_path="$RUNNER_TEMP/android-ci-release.keystore"
          temp_keystore_password="android"
          temp_key_alias="ci-upload"
          temp_key_password="android"
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore "$temp_keystore_path" \
            -storepass "$temp_keystore_password" \
            -alias "$temp_key_alias" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -keypass "$temp_key_password" \
            -dname "CN=BeFam CI, OU=CI, O=BeFam, L=HCMC, S=HCMC, C=VN"
          export ANDROID_KEYSTORE_PATH="$temp_keystore_path"
          export ANDROID_KEYSTORE_PASSWORD="$temp_keystore_password"
          export ANDROID_KEY_ALIAS="$temp_key_alias"
          export ANDROID_KEY_PASSWORD="$temp_key_password"
          flutter build appbundle --release "${build_common_args[@]}"

      - name: Build mobile release image
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          docker_config_dir="$RUNNER_TEMP/docker-config-anon-mobile"
          mkdir -p "$docker_config_dir"
          printf '{"auths":{}}\n' > "$docker_config_dir/config.json"
          export DOCKER_CONFIG="$docker_config_dir"
          docker logout docker.io >/dev/null 2>&1 || true
          for attempt in 1 2 3; do
            if docker build \
              --platform linux/amd64 \
              --build-arg RELEASE_VERSION=0.0.0-ci \
              --build-arg VCS_REF="${GITHUB_SHA}" \
              --tag befam-mobile-builder:test \
              .; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to build mobile release image after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

  security-dependency-review:
    name: Security - Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Push-only dependency review policy notice
        run: |
          set -euo pipefail
          echo "::notice::Dependency review is configured for push-only CI to avoid duplicate pull_request runs."
          echo "::notice::Trivy and container security scans remain mandatory in this workflow."

  security-trivy-fs:
    name: Security - Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Trivy filesystem scan (SARIF report)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-fs.sarif
          trivyignores: .trivyignore
          skip-files: firebase/functions/firestore-debug.log

      - name: Upload Trivy security report
        if: always()
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Enforce Trivy filesystem gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          trivyignores: .trivyignore
          skip-files: firebase/functions/firestore-debug.log

  security-gitleaks:
    name: Security - Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  security-trivy-images:
    name: Security - Trivy Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Prepare Docker auth for public registry pulls
        run: |
          set -euo pipefail
          docker_config_dir="$RUNNER_TEMP/docker-config-anon-security"
          mkdir -p "$docker_config_dir"
          printf '{"auths":{}}\n' > "$docker_config_dir/config.json"
          export DOCKER_CONFIG="$docker_config_dir"
          docker logout docker.io >/dev/null 2>&1 || true
          echo "DOCKER_CONFIG=$docker_config_dir" >> "$GITHUB_ENV"

      - name: Build Firebase tooling image for scan
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if docker build --file docker/firebase-tools.Dockerfile --tag befam-firebase-tools:scan .; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to build Firebase tooling scan image after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Build mobile builder image for scan
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if docker build --file Dockerfile --tag befam-mobile-builder:scan .; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to build mobile builder scan image after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Scan Firebase tooling image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: befam-firebase-tools:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore.images

      - name: Scan mobile builder image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: befam-mobile-builder:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore.images
